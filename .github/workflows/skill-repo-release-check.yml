name: skill-repo-release-check

on:
  push:
    tags:
      - "v*"

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run release check
        run: python scripts/skill_repo.py release-check --ref "${GITHUB_REF_NAME}"
